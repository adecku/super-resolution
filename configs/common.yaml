project:
  name: "super_resolution"
  seed: 42

runtime:
  amp: true
  num_workers: 4

paths:
  data_root: "data/raw/DIV2K"
  output_root: "outputs/runs"
  figures_dir: "outputs/figures"

data:
  dataset: "DIV2K"
  scale: 2
  patch_size: 96
  batch_size: 16
  val_batch_size: 1
  lr_downsample: "bicubic"

model:
  name: "srcnn"
  params: {}

train:
  epochs: 30
  lr: 0.0002
  optimizer: "adam"
  weight_decay: 0.0
  grad_accum_steps: 1
  save_every: 1
  log_every: 50
  full_image: false

eval:
  metrics: ["psnr", "ssim"]
  save_examples: true
  num_examples: 8
  full_image: true